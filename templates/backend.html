<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROWESS | Backend View</title>
    <link rel="stylesheet" href="static/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>

    <div class="app-container">
        <!-- Left Panel: Content & Controls -->
        <section class="control-panel">
            <header>
                <div class="system-status">
                    <span class="pulse"></span> STATUS: OPTIMIZATION_READY
                </div>
                <h1 class="brand">PROWESS</h1>
                <h2 class="tagline">Backend View <br>Environment Scheduling Software</h2>
            </header>

            <nav class="button-stack">
               <button class="btn btn-info"
        hx-get="/"
        hx-target="body"
        hx-swap="innerHTML">
    <span class="btn-id">01</span>
    <span class="btn-text">Homepage</span>
</button>

            </nav>

            <footer class="version-info">
                v1.0.4-stable | Mixed-Integer Linear Problem Solver
            </footer>
        </section>

        <!-- Right Panel: Infographic Placeholder -->
        <section class="visualizer-panel">
            <div class="infographic-placeholder">
               
                <div class="abstract-grid">
                    <!-- Placeholder visual elements -->
                    <div class="node-line" style="top: 20%; left: 10%; width: 60%;"></div>
                    <div class="node-line" style="top: 40%; left: 30%; width: 50%;"></div>
                    <div class="node-line" style="top: 70%; left: 15%; width: 40%;"></div>
                    <div class="dot" style="top: 20%; left: 10%;"></div>
                    <div class="dot" style="top: 20%; left: 70%;"></div>
                    <div class="dot" style="top: 40%; left: 30%;"></div>
                    <div class="dot" style="top: 40%; left: 80%;"></div>
                    <div class="dot" style="top: 70%; left: 15%;"></div>
                    <div class="dot" style="top: 70%; left: 55%;"></div>
                </div>
                <div class="math-overlay">
                    <div class="infographic-placeholder">
                
    <form class="login-form"
        hx-get="/orgpage"
        hx-target="body"
        hx-swap="innerHTML">

        <div class="access-header mono">
            ENTER ACCESS CODE
        </div>

        <!-- Access Code (Password Style) -->
        <div class="input-group floating password-group">
            <input type="password" id="access-code" required>
            <label for="access-code">ACCESS_KEY</label>
            <span class="toggle-password" onclick="toggleAccess()">👁</span>
        </div>

        <!-- Submit -->
        <button class="btn btn-warning login-btn">
            <span class="btn-text">Authenticate</span>
            <span class="arrow">→</span>
        </button>

    </form>

                        
</button>
            </div>
        </section>
    </div>



    <script>
        function toggleAccess() {
            const input = document.getElementById("access-code");
            input.type = input.type === "password" ? "text" : "password";
        }
    </script>
</body>
</html>
