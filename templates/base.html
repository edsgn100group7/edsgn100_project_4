<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PROWESS - Hybrid Work Scheduling{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="page-container">
        <header>
            <div>
                <div class="header-brand">PROWESS</div>
                <div class="header-subtitle">Hybrid Work Scheduling</div>
            </div>

            <nav class="header-nav">
                {% if session.get('employee_id') %}
                    <span class="header-user">{{ session.get('employee_name') }}</span>
                    <a href="{{ url_for('employee_logout') }}" class="btn">Logout</a>
                {% else %}
                    <a href="{{ url_for('home') }}" class="btn">Home</a>
                    <a href="{{ url_for('employee_login') }}" class="btn btn-primary">Employee Login</a>
                    <a href="{{ url_for('team_view') }}" class="btn">Team View</a>
                    <a href="{{ url_for('admin_view') }}" class="btn">Admin</a>
                {% endif %}
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
