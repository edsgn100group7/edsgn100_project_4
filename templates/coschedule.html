<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROWESS | Company Schedule </title>
    <link rel="stylesheet" href="static/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
        function confirmHomepageNavigation() {
            return confirm('Are you sure you want to return to homepage?');
        }
    </script>
</head>
<body>

    <div class="app-container">
        <!-- Left Panel: Content & Controls -->
        <section class="control-panel">
            <header>
                <div class="system-status">
                    <span class="pulse"></span> STATUS: OPTIMIZATION_READY
                </div>
                <h1 class="brand">PROWESS</h1>
                <h2 class="tagline">Company Schedule <br>Environment Scheduling Software</h2>
            </header>


            <nav class="button-stack">
                   <button class="btn btn-info"
        hx-get="/"
        hx-target="body"
        hx-swap="innerHTML"
        onclick="return confirmHomepageNavigation()">
    <span class="btn-id">01</span>
    <span class="btn-text">Homepage</span>
</button>
<button class="btn btn-info"
        hx-get="/orgpage"
        hx-target="body"
        hx-swap="innerHTML">
              <span class="btn-id">02</span>
    <span class="btn-text">Organization Hub</span>
</button>


            </nav>

            <footer class="version-info">
                v1.0.4-stable | Mixed-Integer Linear Problem Solver
            </footer>
        </section>

        <!-- Right Panel: Infographic Placeholder -->
        <section class="visualizer-panel">
            <div class="infographic-placeholder">
                <div class="schematic-header">
                    
                </div>
                <div class="abstract-grid">
                    <!-- Placeholder visual elements -->
                    <div class="node-line" style="top: 20%; left: 10%; width: 60%;"></div>
                    <div class="node-line" style="top: 40%; left: 30%; width: 50%;"></div>
                    <div class="node-line" style="top: 70%; left: 15%; width: 40%;"></div>
                    <div class="dot" style="top: 20%; left: 10%;"></div>
                    <div class="dot" style="top: 20%; left: 70%;"></div>
                    <div class="dot" style="top: 40%; left: 30%;"></div>
                    <div class="dot" style="top: 40%; left: 80%;"></div>
                    <div class="dot" style="top: 70%; left: 15%;"></div>
                    <div class="dot" style="top: 70%; left: 55%;"></div>
                </div>
                <div class="math-overlay">
                </div>

                <div class="calendar-container">
                    <div class="calendar-header">
                        <h3 id="calendar-month-year">December 2024</h3>
                        <div class="calendar-nav">
                            <button class="calendar-btn" onclick="changeMonth(-1)">‹</button>
                            <button class="calendar-btn" onclick="changeMonth(1)">›</button>
                        </div>
                    </div>
                    <div class="calendar-grid">
                        <div class="calendar-weekdays">
                            <div class="calendar-weekday">Sun</div>
                            <div class="calendar-weekday">Mon</div>
                            <div class="calendar-weekday">Tue</div>
                            <div class="calendar-weekday">Wed</div>
                            <div class="calendar-weekday">Thu</div>
                            <div class="calendar-weekday">Fri</div>
                            <div class="calendar-weekday">Sat</div>
                        </div>
                        <div id="calendar-days" class="calendar-days">
                            <!-- Calendar days will be generated by JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <style>
        .calendar-container {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin: 20px auto;
            max-width: 600px;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .calendar-header h3 {
            color: #fff;
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        
        .calendar-nav {
            display: flex;
            gap: 10px;
        }
        
        .calendar-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .calendar-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        
        .calendar-grid {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
        }
        
        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .calendar-weekday {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            font-size: 14px;
            padding: 8px;
        }
        
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }
        
        .calendar-day {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .calendar-day:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .calendar-day.other-month {
            color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.02);
        }
        
        .calendar-day.today {
            background: rgba(76, 175, 80, 0.3);
            border-color: rgba(76, 175, 80, 0.5);
            color: #fff;
            font-weight: 600;
        }
        
        .calendar-day.weekend {
            color: rgba(255, 152, 0, 0.8);
        }
    </style>

    <script>
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();

        function generateCalendar(month, year) {
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const prevLastDay = new Date(year, month, 0);
            
            const firstDayIndex = firstDay.getDay();
            const lastDayDate = lastDay.getDate();
            const prevLastDayDate = prevLastDay.getDate();
            
            const monthNames = [
                "January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"
            ];
            
            // Update month/year display
            document.getElementById('calendar-month-year').textContent = 
                `${monthNames[month]} ${year}`;
            
            let days = '';
            
            // Previous month days
            for (let x = firstDayIndex; x > 0; x--) {
                days += `<div class="calendar-day other-month">${prevLastDayDate - x + 1}</div>`;
            }
            
            // Current month days
            const today = new Date();
            for (let i = 1; i <= lastDayDate; i++) {
                const isToday = i === today.getDate() && 
                              month === today.getMonth() && 
                              year === today.getFullYear();
                const isWeekend = new Date(year, month, i).getDay() === 0 || 
                                 new Date(year, month, i).getDay() === 6;
                
                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (isWeekend) classes += ' weekend';
                
                days += `<div class="${classes}">${i}</div>`;
            }
            
            // Next month days
            const remainingDays = 42 - (firstDayIndex + lastDayDate);
            for (let j = 1; j <= remainingDays; j++) {
                days += `<div class="calendar-day other-month">${j}</div>`;
            }
            
            document.getElementById('calendar-days').innerHTML = days;
        }
        
        function changeMonth(direction) {
            currentMonth += direction;
            
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            
            generateCalendar(currentMonth, currentYear);
        }
        
        // Initialize calendar on page load
        document.addEventListener('DOMContentLoaded', function() {
            generateCalendar(currentMonth, currentYear);
        });
    </script>
            </div>
        </section>
    </div>

</body>
</html>
