{% extends "base.html" %}

{% block title %}PROWESS{% endblock %}

{% block content %}
<style>
    .page-container {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        min-height: 100vh !important;
    }

    main {
        max-width: 500px !important;
        padding: 2rem !important;
        text-align: center !important;
    }

    main h1 {
        font-size: 2.5rem !important;
        margin-bottom: 0.5rem !important;
    }

    main > p {
        font-size: 0.95rem !important;
        color: #666 !important;
        margin-bottom: 2.5rem !important;
    }

    .nav-buttons {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .nav-buttons a {
        display: block;
        padding: 1rem;
        font-size: 1rem;
        font-weight: 600;
        border: none;
        border-radius: 4px;
        text-decoration: none;
        transition: all 0.2s ease;
    }

    .nav-buttons a:nth-child(1) {
        background: #4a8c5c;
        color: white;
    }

    .nav-buttons a:nth-child(1):hover {
        background: #3a7048;
    }

    .nav-buttons a:nth-child(2) {
        background: #2c7da0;
        color: white;
    }

    .nav-buttons a:nth-child(2):hover {
        background: #226080;
    }

    .nav-buttons a:nth-child(3) {
        background: #d4622a;
        color: white;
    }

    .nav-buttons a:nth-child(3):hover {
        background: #b8501e;
    }
</style>

<h1>PROWESS</h1>
<p>Hybrid Work Scheduling System</p>

<div class="nav-buttons">
    <a href="{{ url_for('employee_login') }}">Employee Portal</a>
    <a href="{{ url_for('team_view') }}">Manager View</a>
    <a href="{{ url_for('admin_view') }}">Admin Dashboard</a>
</div>
{% endblock %}
