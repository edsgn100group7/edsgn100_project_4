<div id="budget-counter" 
     {% if oob %} hx-swap-oob="true" {% endif %}
     class="text-right">
    <div class="text-2xl font-black {% if remaining > 0 %}text-green-400{% else %}text-rose-400{% endif %}">
        {{ remaining }}
    </div>
    <div class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Days Remaining</div>
</div>
