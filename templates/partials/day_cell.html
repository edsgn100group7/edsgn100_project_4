<div id="{{ day_id }}" 
     hx-post="/update-day/{{ day_id }}" 
     hx-trigger="click" 
     hx-target="this" 
     hx-swap="outerHTML"
     class="h-24 border-2 rounded-xl flex flex-col items-center justify-center cursor-pointer transition-all duration-150 active:scale-95
     {% if status == 0 %} border-slate-100 bg-white hover:border-indigo-200 
     {% elif status == 1 %} border-amber-200 bg-amber-50 text-amber-700
     {% else %} border-rose-200 bg-rose-50 text-rose-700 {% endif %}">
    
    <span class="text-[10px] uppercase font-bold opacity-50">{{ day_id.replace('_', ' ') }}</span>
    
    <span class="text-xs font-bold text-center px-1">
        {% if status == 0 %} <span class="text-indigo-600">IN-OFFICE</span>
        {% elif status == 1 %} PREFER OFF
        {% else %} MUST BE OFF {% endif %}
    </span>
</div>
